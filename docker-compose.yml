version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-video-studio-api
    ports:
      - "8000:8000"
    environment:
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      - DEVICE=${DEVICE:-cuda}
      - MODEL_PATH=/models
      - OUTPUT_PATH=/outputs
      - API_LOG_LEVEL=${API_LOG_LEVEL:-info}
    volumes:
      - ./models:/models
      - ./outputs:/outputs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: ai-video-studio-ui
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    restart: unless-stopped

volumes:
  models:
  outputs:
